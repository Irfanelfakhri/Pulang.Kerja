<!DOCTYPE html>
<html>
<head>
    <title>MLBB Redirector</title>
</head>
<body style="background-color: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center;">

    <div id="status">Memproses...</div>

    <script>
        function checkTime() {
            // Mengambil waktu sekarang berdasarkan zona waktu lokal perangkat
            const sekarang = new Date();
            const jam = sekarang.getHours();
            const statusDiv = document.getElementById('status');

            // Logika: Jam 08:00 sampai 16:59 (8-16) dilarang
            if (jam >= 8 && jam < 17) {
                statusDiv.innerHTML = "<h2>Akses Ditutup</h2><p>Silakan scan kembali nanti pada jam 17:00 WIB.</p>";
            } else {
                statusDiv.innerHTML = "<h2>Membuka Mobile Legends...</h2>";
                // Mengalihkan ke aplikasi
                window.location.href = "mobilelegends://app";
            }
        }

        // Jalankan fungsi setelah halaman dimuat
        window.onload = checkTime;
    </script>
</body>
</html>
